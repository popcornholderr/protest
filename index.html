<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Protest Campaign</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f9fafb;
            color: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #dc2626;
        }
        p {
            color: #4b5563;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            background-color: #dc2626;
            color: white;
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            transition: background-color 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: #b91c1c;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Demand for Resignation</h1>
    <p>Click the button below to automatically draft the protest email from your default email application.</p>
    
    <a class="btn" href="mailto:minister.sm@gov.in,d.pradhan@sansad.nic.in?subject=DEMAND%20FOR%20RESIGNATION&body=YOU%20ARE%20INCOMPETENT%20AS%20THE%20EDUCATION%20MINISTER.%20STUDENTS%20HAVE%20TAKEN%20THEIR%20LIVES%20AND%20THEIR%20BLOOD%20IS%20ON%20YOUR%20HANDS.%0A%0AHAVE%20SOME%20SHAME%20AND%20HUMANITY%20AND%20RESIGN%20NOW!%0A%0AGo%20PRADHAN%20Go!">
        Click to Send Email
    </a>
</div>

</body>
</html>
